<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optibus Preference Report Settings</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        max-width: 720px;
        font: 15px/1.5 "Segoe UI", Arial, sans-serif;
        color: #1f2430;
        background: #faf7f1;
      }
      h1 {
        margin-top: 0;
      }
      label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #d9cfbf;
        font: inherit;
        box-sizing: border-box;
      }
      button {
        margin-top: 14px;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        background: #0f766e;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .note {
        margin-top: 10px;
        color: #5e6573;
      }
      .status {
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 12px;
        background: white;
        border: 1px solid #ddd4c3;
      }
    </style>
  </head>
  <body>
    <h1>Extension Settings</h1>
    <p>Paste the URL of your deployed backend API here. Example: <code>https://your-api.onrender.com</code></p>
    <label for="api-base-url">Backend API URL</label>
    <input id="api-base-url" type="url" placeholder="https://your-api.onrender.com" />
    <button id="save-settings">Save Settings</button>
    <div class="note">You only need to do this once per browser profile.</div>
    <div id="settings-status" class="status">Current value will appear here.</div>
    <script src="options.js"></script>
  </body>
</html>
